<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Certo Atacado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: linear-gradient(135deg, #ff6600 0%, #ff8533 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #ff6600; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; }
        input:focus { outline: none; border-color: #ff6600; }
        button { width: 100%; padding: 14px; background: #ff6600; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #e65c00; }
        .msg { padding: 12px; margin-bottom: 15px; border-radius: 8px; display: none; font-size: 14px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .back-link { display: inline-block; margin-top: 20px; color: #ff6600; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Recuperar Senha</h2>
        <p>Digite seu e-mail cadastrado e enviaremos um link para redefinir sua senha.</p>
        
        <div id="msg" class="msg"></div>
        
        <form id="recuperacaoForm">
            <input type="email" id="email" placeholder="seu@email.com" required>
            <button type="submit">Enviar Link de Recuperação</button>
        </form>
        
        <a href="index.html" class="back-link">← Voltar ao Login</a>
    </div>

    <script>
        const form = document.getElementById('recuperacaoForm');
        const msg = document.getElementById('msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            try {
                const res = await fetch('http://localhost:3000/admin/recuperar-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();

                if (res.ok) {
                    msg.className = 'msg success';
                    msg.textContent = '✅ ' + data.mensagem;
                    msg.style.display = 'block';
                    form.style.display = 'none';
                } else {
                    throw new Error(data.erro);
                }
            } catch (err) {
                msg.className = 'msg error';
                msg.textContent = '❌ ' + err.message;
                msg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
