<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Certo Atacado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #ff6600; margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #ff6600; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #e65c00; }
        .msg { padding: 10px; margin-bottom: 15px; border-radius: 5px; display: none; text-align: center; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Nova Senha</h2>
        <div id="msg" class="msg"></div>
        <form id="resetForm">
            <input type="password" id="senha" placeholder="Nova senha" required minlength="6">
            <input type="password" id="confirmar" placeholder="Confirmar senha" required minlength="6">
            <button type="submit">Atualizar Senha</button>
        </form>
        <p style="margin-top: 15px; text-align: center;">
            <a href="index.html" style="color: #ff6600; text-decoration: none;">← Voltar ao Login</a>
        </p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const form = document.getElementById('resetForm');
        const msg = document.getElementById('msg');

        if (!token) {
            msg.className = 'msg error';
            msg.textContent = 'Token inválido. Solicite um novo link.';
            msg.style.display = 'block';
            form.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const senha = document.getElementById('senha').value;
            const confirmar = document.getElementById('confirmar').value;

            if (senha !== confirmar) {
                msg.className = 'msg error';
                msg.textContent = 'As senhas não coincidem.';
                msg.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/admin/resetar-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, novaSenha: senha })
                });
                const data = await res.json();

                if (res.ok) {
                    msg.className = 'msg success';
                    msg.textContent = data.mensagem + ' Redirecionando...';
                    msg.style.display = 'block';
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    throw new Error(data.erro);
                }
            } catch (err) {
                msg.className = 'msg error';
                msg.textContent = err.message || 'Erro ao redefinir senha.';
                msg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
